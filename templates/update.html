<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Post – My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Update post</h1>
    <form action="{{ url_for('update', post_id=post.id) }}" method="post" class="add-form">
        <label for="author">Author</label>
        <input type="text" id="author" name="author" value="{{ post.author }}" required>

        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{ post.title }}" required>

        <label for="content">Content</label>
        <textarea id="content" name="content" rows="6" required>{{ post.content }}</textarea>

        <button type="submit">Update post</button>
    </form>
    <p><a href="{{ url_for('index') }}">← Back to blog</a></p>
</body>
</html>
